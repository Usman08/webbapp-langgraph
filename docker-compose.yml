services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-salesinvoice}
      POSTGRES_USER: ${POSTGRES_USER:-salesinvoice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salesinvoice}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salesinvoice}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-salesinvoice};Username=${POSTGRES_USER:-salesinvoice};Password=${POSTGRES_PASSWORD:-salesinvoice}"
      EngineToken: ${ENGINE_TOKEN}
      AiEngineUrl: "http://ai-engine:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    # Not exposed publicly — internal network only
    networks:
      - default
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-120b}
      ENGINE_TOKEN: ${ENGINE_TOKEN}
      BACKEND_URL: "http://backend:8080"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - backend

volumes:
  postgres_data:
